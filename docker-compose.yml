version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prueba-aws-web
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - app-network
    volumes:
      - /home/ec2-user/.aws:/root/.aws:ro

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network
    depends_on:
      - web

networks:
  app-network:
    driver: bridge
